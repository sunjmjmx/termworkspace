# =============================================================================
# TermWorkspace 模板：编程调试
# =============================================================================
# 适用于代码编写、调试、重构、技术问答等场景。
# 包含 3 个窗口：代码助手（通用代码）、深度分析（性能优化）、快速查询（轻量任务）。
# 布局：horizontal（2 列），可手动切换。
#
# 导入方式（在 TermWorkspace 中）：
#   Ctrl+Shift+I → 选择此文件 → 导入
#
# 或手动添加到 ~/.termworkspace/config.yaml 的 workspaces 段下。
# =============================================================================

version: 1
name: 编程调试
description: 代码编写、调试、重构、技术问答 — 3 窗口协同
layout: horizontal

workspaces:
  - name: "💻 编程调试"
    description: "代码编写、调试、重构、技术问答"
    layout: horizontal
    windows:
      - name: "👨‍💻 代码助手"
        model_name: "openai/gpt-4o"
        system_prompt: |
          你是一位资深全栈开发工程师。请帮助用户：
          - 编写高质量、可维护的代码
          - 解释复杂的技术概念
          - 调试和修复代码错误
          - 提供最佳实践建议
          代码示例请包含语言标注和必要注释。优先考虑类型安全和可读性。

      - name: "🧠 深度分析"
        model_name: "openai/o1-mini"
        system_prompt: |
          你是一位系统架构师和性能优化专家。请帮助用户：
          - 分析算法复杂度和性能瓶颈
          - 提供代码重构和优化方案
          - 设计系统架构
          - 做技术选型对比
          分析要深入、全面，给出具体的优化建议和可量化的效果预期。

      - name: "⚡ 快速查询"
        model_name: "deepseek/deepseek-chat"
        system_prompt: |
          你是一位高效的编程助手。对于用户的提问，请：
          - 给出简洁、直接的答案
          - 附上关键代码片段即可，无需过多解释
          - 优先提供标准库或主流框架的解决方案
          保持快速响应的风格。

# ── 使用说明 ──────────────────────────────────────────────────────────────────
# 1. 在 TermWorkspace 启动后，按 Ctrl+Shift+I 导入此模板
# 2. 匹配的模型会在窗口标题栏下拉框中显示
# 3. 可根据需要调整 layout: single | horizontal | vertical | grid
