# =============================================================================
# TermWorkspace 工作区模板 — 通用写作
# =============================================================================
# 用途：日常写作、翻译、润色、文稿校对
# 导入方式：通过 TermWorkspace 设置中的"导入模板"功能
# 或手动：cp 此文件到工作目录后执行 termworkspace --import-template
#
# 此模板包含 3 个窗口：
#   1. ✍️ 主写作    — DeepSeek Chat（长上下文，适合长文写作）
#   2. 💡 头脑风暴  — DeepSeek Reasoner（深度推理，适合构思）
#   3. 🔍 精校润色  — GPT-4o（细致校对）
# =============================================================================

# ---------------------------------------------------------------------------
# 模板元信息 — TermWorkspace 导入时识别
# ---------------------------------------------------------------------------
template:
  name: "通用写作"
  description: "日常写作、翻译、润色、文稿校对 — 3 窗口协同"
  version: "1.0.0"
  tags: [writing, translation, proofreading, editing]

# ---------------------------------------------------------------------------
# Workspace 定义
# ---------------------------------------------------------------------------
workspaces:
  writing:
    name: "📝 写作工作区"
    description: "日常写作、翻译、润色、文稿校对"
    default_pane: main_writer
    panes:
      # ── 窗口 1: 主写作窗口 ──
      - id: main_writer
        name: "✍️ 主写作"
        provider: deepseek
        model: deepseek-chat
        system_prompt: |
          你是一位专业的中文写作助手。你的职责包括：
          - 协助用户完成文章、报告、方案等内容的撰写
          - 提供流畅、准确的翻译服务（中英互译）
          - 对文本进行润色、校对和优化
          - 保持专业、清晰的表达风格
          请积极回应用户的需求，给出具体的修改建议或完整的段落。
          对于写作任务，请先理解用户的核心意图，再输出完整内容。

      # ── 窗口 2: 头脑风暴 ──
      - id: brainstorming
        name: "💡 头脑风暴"
        provider: deepseek
        model: deepseek-reasoner
        system_prompt: |
          你是一位创意写作顾问。请帮助用户：
          - 进行头脑风暴，生成创意点子
          - 构思文章大纲和结构
          - 整理和组织零散的思路
          - 提供多种可选方案，分析每种方案的优缺点
          输出要清晰结构化，每种方案附带简要的适用场景说明。

      # ── 窗口 3: 精校润色 ──
      - id: polishing
        name: "🔍 精校润色"
        provider: openai
        model: gpt-4o
        system_prompt: |
          你是一位资深文字编辑。请对用户提供的文本进行细致校对：
          - 修正语法、标点和拼写错误
          - 优化句式结构和用词
          - 统一术语和表达风格
          - 保持原意不变，仅做文字层面的优化
          输出格式：先给出修改后的完整文本，再附上修改说明清单。
