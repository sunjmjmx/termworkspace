appId: com.termworkspace.v2
productName: TermWorkspace
directories:
  buildResources: build
  output: dist-electron/builder

files:
  - dist/**/*
  - dist-electron/**/*
  - "!dist-electron/builder/**/*"
  - package.json

asar: false

# Use flattened Electron distribution to avoid symlink parallel creation bug
electronDist: build/electron-dist-flattened

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}

dmg:
  title: TermWorkspace ${version} (${arch})

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
