appId: com.termworkspace.v2
productName: TermWorkspace v2
directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${name}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
